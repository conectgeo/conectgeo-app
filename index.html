<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConectGeo — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
:root{--leaf:#5fa832;--leaf2:#4a8a26;--earth:#3d3226;--sand2:#ede8e0;--muted:#7a7268;--danger:#d94f3d;--f:'Inter',sans-serif;--fd:'Space Grotesk',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--earth) 0%,#2a3820 100%);padding:20px;}
.card{background:#fff;border-radius:20px;padding:46px 42px;width:100%;max-width:410px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:34px;}
.logo-ic{width:46px;height:46px;border-radius:12px;background:var(--earth);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-nm{font-family:var(--fd);font-size:21px;font-weight:700;color:var(--earth);}
.logo-nm span{color:var(--leaf);}
.logo-sb{font-size:9.5px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-top:2px;}
h1{font-family:var(--fd);font-size:21px;font-weight:700;margin-bottom:5px;color:#1c1c1c;}
.sub{font-size:12px;color:var(--muted);margin-bottom:26px;}
label{display:block;font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
input{width:100%;padding:12px 13px;border:1.5px solid var(--sand2);border-radius:10px;font-size:13px;font-family:var(--f);outline:none;transition:.14s;margin-bottom:15px;}
input:focus{border-color:var(--leaf);box-shadow:0 0 0 3px rgba(95,168,50,.1);}
button{width:100%;padding:13px;background:var(--leaf);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);transition:.15s;}
button:hover{background:var(--leaf2);}
button:disabled{opacity:.6;cursor:wait;}
.err{display:none;background:#fce8e8;color:var(--danger);border-radius:9px;padding:10px 13px;font-size:12px;margin-bottom:14px;line-height:1.4;}
.err.show{display:block;}
.foot{text-align:center;margin-top:18px;font-size:11px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-ic"><svg width="28" height="28" viewBox="0 0 32 32" fill="none"><path d="M6 26Q10 12 16 10Q22 8 26 14" stroke="#a3d470" stroke-width="2.5" stroke-linecap="round"/><path d="M12 26Q16 16 20 14Q24 12 26 18" stroke="#5fa832" stroke-width="2" stroke-linecap="round"/><circle cx="26" cy="14" r="3" fill="#a3d470"/></svg></div>
    <div><div class="logo-nm">Conect<span>Geo</span></div><div class="logo-sb">Agricultura de Precisão</div></div>
  </div>
  <h1>Bem-vindo de volta</h1>
  <div class="sub">Acesse para gerenciar seus projetos e clientes</div>
  <div class="err" id="err"></div>
  <form id="login-form">
    <label for="email">E-mail</label>
    <input type="email" id="email" autocomplete="email" required>
    <label for="senha">Senha</label>
    <input type="password" id="senha" autocomplete="current-password" required>
    <button type="submit" id="btn">Entrar na plataforma</button>
  </form>
  <div class="foot">Não tem acesso?<br>Fale com o administrador da ConectGeo.</div>
</div>

<script>
const SUPABASE_URL = 'https://xlhwhhettdnssvvppiuf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HK6W6kBCMF627z31zvGFZA_VjcaGlSe';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// se já está logado, verifica se é admin ou consultor
sb.auth.getSession().then(async ({data:{session}})=>{ 
  if(!session) return;
  const { data: consultant } = await sb
    .from('consultores')
    .select('is_admin')
    .eq('id', session.user.id)
    .single();
  location.href = (consultant && consultant.is_admin) ? 'admin.html' : 'app.html';
});

document.getElementById('login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.classList.remove('show');
  btn.disabled=true; btn.textContent='Entrando…';
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const { data: authData, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if(error){
    err.textContent = error.message==='Invalid login credentials'
      ? 'E-mail ou senha incorretos.' : 'Erro ao entrar: '+error.message;
    err.classList.add('show');
    btn.disabled=false; btn.textContent='Entrar na plataforma';
    return;
  }
  // Verificar se é admin
  const { data: consultant, error: checkErr } = await sb
    .from('consultores')
    .select('is_admin')
    .eq('id', authData.user.id)
    .single();
  
  if(checkErr || !consultant) {
    console.warn('Consultor não encontrado, redirecionando para app.html');
    location.href='app.html';
    return;
  }
  // Redirecionar baseado no tipo
  location.href = consultant.is_admin ? 'admin.html' : 'app.html';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ConectGeo — Produtor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --leaf:#6cb32d; --leaf2:#559426; --leaf-bg:#eef6e3; --sand:#f5f6f3; --sand2:#dfe2da; --ink:#24271f; --muted:#646a5e; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--sand);}
  #app{display:flex;flex-direction:column;height:100vh;}
  .top{display:flex;align-items:center;gap:14px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--sand2);flex-wrap:wrap;}
  .brand{font-weight:700;font-size:16px;}
  .brand span{color:var(--leaf);}
  .who{min-width:0;}
  .who .f{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .who .c{font-size:12px;color:var(--muted);}
  .picker{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .pk{display:flex;align-items:center;gap:7px;}
  .picker label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  select{padding:9px 11px;border:1.5px solid var(--sand2);border-radius:9px;font-size:14px;background:#fff;min-width:170px;}
  #frameWrap{flex:1;min-height:0;position:relative;}
  iframe{width:100%;height:100%;border:0;}
  .msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:24px;}
  .err{color:#c0392b;}
  .msel{position:relative;}
  .msel-btn{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid var(--sand2);border-radius:9px;font-size:14px;background:#fff;min-width:190px;cursor:pointer;text-align:left;}
  .msel-btn #tal-summary{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .msel-caret{color:var(--muted);font-size:11px;}
  .msel-panel{position:absolute;top:calc(100% + 6px);right:0;z-index:2000;background:#fff;border:1.5px solid var(--sand2);border-radius:11px;box-shadow:0 8px 28px rgba(0,0,0,.16);padding:8px;min-width:240px;max-width:340px;display:none;}
  .msel-panel.open{display:block;}
  .msel-head{display:flex;justify-content:flex-end;padding:2px 4px 6px;}
  .msel-head a{font-size:11px;font-weight:700;color:var(--leaf2);cursor:pointer;text-transform:uppercase;letter-spacing:.04em;}
  .msel-list{max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:2px;}
  .msel-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;font-size:13.5px;}
  .msel-item:hover{background:var(--leaf-bg);}
  .msel-item input{width:17px;height:17px;accent-color:var(--leaf);cursor:pointer;flex-shrink:0;}
  .msel-go{margin-top:8px;width:100%;padding:10px;border:0;border-radius:9px;background:var(--leaf);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;}
  .msel-go:hover{background:var(--leaf2);}
  @media(max-width:680px){ .msel-panel{right:auto;left:0;} .msel-btn{min-width:150px;} }
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="brand" id="cg-brand">Conect<span>Geo</span></div>
    <div class="who"><div class="f" id="cli-nome">Carregando…</div><div class="c" id="cli-loc"></div></div>
    <div class="picker">
      <div class="pk"><label>Fazenda</label><select id="sel-fazenda" onchange="onFazenda()"></select></div>
      <div class="pk"><label>Talhão</label>
        <div class="msel" id="tal-msel">
          <button type="button" class="msel-btn" id="tal-btn" onclick="toggleTalPanel(event)"><span id="tal-summary">Selecione…</span><span class="msel-caret">▾</span></button>
          <div class="msel-panel" id="tal-panel">
            <div class="msel-head"><a id="tal-all" onclick="talToggleTodos()">Selecionar todos</a></div>
            <div class="msel-list" id="tal-list"></div>
            <button class="msel-go" id="tal-go" onclick="abrirSelecionados()">Ver no mapa</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="frameWrap">
    <div class="msg" id="msg">Carregando produtor…</div>
    <iframe id="frame" style="display:none"></iframe>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://xlhwhhettdnssvvppiuf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HK6W6kBCMF627z31zvGFZA_VjcaGlSe';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const params = new URLSearchParams(location.search);
  const cToken = params.get('c');
  const lang = params.get('lang') || 'pt';
  let FAZENDAS = [];

  function setMsg(txt, isErr){
    const m=document.getElementById('msg');
    m.style.display='flex'; m.textContent=txt; m.className='msg'+(isErr?' err':'');
    document.getElementById('frame').style.display='none';
  }

  async function aplicarLogoConsultor(token){
    try{
      const { data } = await sb.rpc('get_consultor_branding',{ p_token: token });
      const b = (typeof data==='string') ? JSON.parse(data) : data;
      if(b && !b.erro && b.logo_url){
        const el=document.getElementById('cg-brand');
        if(el) el.innerHTML='<img src="'+b.logo_url+'" alt="logo" style="height:50px;max-width:240px;object-fit:contain;display:block" onerror="this.parentNode.innerHTML=\'Conect<span style=&quot;color:var(--leaf)&quot;>Geo</span>\'">';
      }
    }catch(e){}
  }

  async function init(){
    if(!cToken){ setMsg('Link inválido (sem token de produtor).', true); return; }
    try{
      aplicarLogoConsultor(cToken);
      const { data, error } = await sb.rpc('get_cliente_link_data', { p_token: cToken });
      if(error) throw error;
      const d = (typeof data==='string') ? JSON.parse(data) : data;
      if(!d || d.erro){ setMsg('Este link de produtor não é válido ou foi revogado.', true); return; }
      document.getElementById('cli-nome').textContent = d.cliente || 'Produtor';
      document.getElementById('cli-loc').textContent = [d.municipio, d.pais].filter(Boolean).join(' · ');
      document.title = 'ConectGeo — ' + (d.cliente||'Produtor');
      FAZENDAS = (d.fazendas||[]).filter(f=>(f.talhoes||[]).some(t=>t.token));
      if(!FAZENDAS.length){ setMsg('Este produtor ainda não tem talhões disponíveis.', true); return; }
      const selF=document.getElementById('sel-fazenda');
      selF.innerHTML = FAZENDAS.map((f,i)=>`<option value="${i}">${f.nome}</option>`).join('');
      onFazenda();
    }catch(err){
      setMsg('Erro ao abrir o produtor: ' + (err.message||err), true);
    }
  }

  function talItems(){ return Array.from(document.querySelectorAll('#tal-list input[type=checkbox]')); }
  function onFazenda(){
    const i=+document.getElementById('sel-fazenda').value;
    const f=FAZENDAS[i]; if(!f) return;
    const tals=(f.talhoes||[]).filter(t=>t.token);
    const list=document.getElementById('tal-list');
    list.innerHTML = tals.map((t,idx)=>`<label class="msel-item"><input type="checkbox" value="${t.token}" data-nome="${(t.nome||'').replace(/"/g,'&quot;')}" ${idx===0?'checked':''} onchange="talCheckChange()"><span>${t.nome} · ${(Number(t.hectares)||0).toFixed(1)} ha</span></label>`).join('');
    talCheckChange();
    abrirSelecionados();
  }
  function talCheckChange(){
    const all=talItems(), marc=all.filter(c=>c.checked);
    const sum=document.getElementById('tal-summary');
    if(sum){ sum.textContent = !marc.length ? 'Selecione talhões' : (marc.length===1 ? marc[0].dataset.nome : marc.length+' talhões selecionados'); }
    const go=document.getElementById('tal-go'); if(go) go.textContent = marc.length>1 ? ('Ver '+marc.length+' juntos no mapa') : 'Ver no mapa';
    const allLink=document.getElementById('tal-all'); if(allLink) allLink.textContent = (marc.length===all.length && all.length) ? 'Desmarcar todos' : 'Selecionar todos';
  }
  function talToggleTodos(){ const all=talItems(); const marcar=all.some(c=>!c.checked); all.forEach(c=>c.checked=marcar); talCheckChange(); }
  function toggleTalPanel(e){ if(e) e.stopPropagation(); document.getElementById('tal-panel').classList.toggle('open'); }
  document.addEventListener('click',(e)=>{ const m=document.getElementById('tal-msel'); if(m && !m.contains(e.target)){ const p=document.getElementById('tal-panel'); if(p) p.classList.remove('open'); } });

  function abrirSelecionados(){
    const marc=talItems().filter(c=>c.checked);
    if(!marc.length){ setMsg('Selecione ao menos um talhão.', false); return; }
    const tokens=marc.map(c=>c.value);
    const fr=document.getElementById('frame');
    document.getElementById('msg').style.display='none';
    fr.style.display='block';
    const p=document.getElementById('tal-panel'); if(p) p.classList.remove('open');
    fr.src = (tokens.length===1)
      ? ('viewer.html?t='+tokens[0]+'&lang='+lang+'&embed=1')
      : ('viewer.html?multi='+tokens.join(',')+'&lang='+lang+'&embed=1');
  }

  init();
</script>
</body>
</html>
